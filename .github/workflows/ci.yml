name: MVP Continuous Integration

on:
  pull_request:
    branches:
      - refact/implementar-arqui-hex
  push:
    branches:
      - refact/implementar-arqui-hex

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=79 --statistics --exclude=tests/,venv/,env/,.venv/,node_modules/,.git/

      - name: Run Unit Tests (if tests exist)
        continue-on-error: true
        run: |
          if [ -d "tests/" ]; then
            pip install pytest pytest-cov
            pytest tests/ -v --cov=. --cov-report=xml --cov-report=html
          else
            echo "No tests directory found. Skipping tests."
          fi
